<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Werklogboek">
  <meta name="theme-color" content="#1a1a1a">
  <title>Werklogboek</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#f5f2ee;--white:#fff;--dark:#1a1a1a;--accent:#e8650a;
      --accent-light:#fff3ec;--border:#e8e2d8;--muted:#888;
      --card:#faf8f5;--green:#2d6a4f;--green-light:#edf7f2;--blue:#1d6fa5;--blue-light:#e8f3fb;
      --purple:#7209b7;--purple-light:#f3e8ff;
      --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
    }
    html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--dark)}
    #app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}
    .spin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px}
    .spin{width:38px;height:38px;border:3px solid #e8e2d8;border-top-color:var(--accent);border-radius:50%;animation:sp .75s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    .spin-txt{font-size:14px;color:var(--muted)}
    .err-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;padding:32px;text-align:center}
    .err-msg{font-size:15px;color:#c0392b;line-height:1.7}
    .retry-btn{padding:11px 22px;background:var(--accent);color:#fff;border:none;border-radius:9px;cursor:pointer;font-size:14px;font-family:var(--font);font-weight:600}
    .toast{position:fixed;bottom:calc(var(--safe-bottom) + 14px);left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:9px 18px;border-radius:22px;font-size:13px;font-weight:600;z-index:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
    .toast.on{opacity:1}
    .sync-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0;box-shadow:0 0 0 2px #1a1a1a}
    .sync-dot.busy{background:#facc15;animation:pulse 1s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .hdr{background:var(--dark);color:#f5f2ee;padding-top:calc(env(safe-area-inset-top, 20px) + 13px);padding-bottom:13px;padding-left:18px;padding-right:18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .hdr-left{display:flex;align-items:center;gap:10px}
    .logo{width:38px;height:38px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .app-name{font-size:17px;font-weight:700;letter-spacing:-.3px}
    .app-sub{font-size:11px;color:#777;margin-top:1px;display:flex;align-items:center;gap:5px}
    .hdr-right{display:flex;align-items:center;gap:8px}
    .tabs{display:flex;background:#2a2a2a;border-radius:9px;padding:3px;gap:3px}
    .tab{padding:7px 13px;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font);background:transparent;color:#777;transition:all .15s}
    .tab.on{background:var(--accent);color:#fff}
    .rates-btn{padding:7px 11px;border:1px solid #3a3a3a;border-radius:8px;background:transparent;color:#bbb;cursor:pointer;font-size:13px;font-family:var(--font);white-space:nowrap}
    .mnav{background:var(--white);border-bottom:1px solid var(--border);padding:11px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
    .nbtn{width:34px;height:34px;border:1px solid var(--border);border-radius:8px;background:var(--white);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--dark);flex-shrink:0}
    .mtitle{font-size:17px;font-weight:700;flex:1;letter-spacing:-.3px}
    .total-badge{background:var(--accent-light);color:var(--accent);padding:5px 12px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid #ffd4b3;white-space:nowrap}
    .main{flex:1;overflow:hidden;position:relative}
    .cal-pane{height:100%;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
    .dhdr{text-align:center;font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;padding:5px 0}
    .dcell{min-height:70px;border:1px solid var(--border);border-radius:9px;padding:7px;cursor:pointer;background:var(--white);transition:all .1s}
    .dcell.wknd{background:#faf8f5}
    .dcell.today{border-color:var(--accent);background:var(--accent-light)}
    .dcell.sel{border-color:var(--accent);background:var(--accent-light);box-shadow:0 0 0 2px #e8650a28}
    .dnum{font-size:12px;font-weight:700}.dnum.today{color:var(--accent)}
    .dhours{font-size:10px;font-weight:700;color:var(--muted)}
    .ddots{margin-top:4px;display:flex;flex-direction:column;gap:2px}
    .ddot-row{display:flex;align-items:center;gap:3px}
    .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .dlabel{font-size:9px;color:#777;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .dkm{font-size:9px;color:var(--blue);font-weight:700}
    .backdrop{position:fixed;inset:0;background:#0005;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none}
    .backdrop.on{opacity:1;pointer-events:all}
    .sheet{position:fixed;bottom:0;left:0;right:0;height:75vh;background:var(--white);border-radius:20px 20px 0 0;box-shadow:0 -4px 30px #0000001a;display:flex;flex-direction:column;z-index:100;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);padding-bottom:var(--safe-bottom)}
    .sheet.on{transform:translateY(0)}
    .sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 0;flex-shrink:0}
    .sheet-hdr{padding:13px 18px;display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0;border-bottom:1px solid var(--border)}
    .sheet-date{font-size:16px;font-weight:700;letter-spacing:-.3px}
    .sheet-sub{font-size:12px;color:var(--muted);margin-top:3px}
    .sheet-hdr-right{display:flex;gap:8px;align-items:center}
    .add-btn{padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font)}
    .x-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:50%;background:var(--white);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
    .sheet-body{flex:1;overflow-y:auto;padding:15px 18px;-webkit-overflow-scrolling:touch}
    .ecard{border:1px solid var(--border);border-radius:12px;padding:13px;background:var(--card);margin-bottom:12px}
    .etop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px}
    .etop-left{display:flex;flex-direction:column;gap:5px}
    .etop-badges{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
    .cbadge{font-size:12px;font-weight:600;padding:3px 11px;border-radius:20px;border:1px solid;display:inline-block}
    .ekm-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--blue);background:var(--blue-light);border:1px solid #b8d9ef;border-radius:20px;padding:3px 10px}
    .eknr-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--purple);background:var(--purple-light);border:1px solid #d8b4fe;border-radius:20px;padding:3px 10px}
    .etop-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
    .ehours{font-size:22px;font-weight:700}
    .enotes{font-size:13px;color:#555;line-height:1.6;margin-bottom:9px}
    .ephoto{width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin-bottom:9px;cursor:zoom-in;display:block}
    .eacts{display:flex;gap:8px;justify-content:flex-end}
    .edit-btn{padding:5px 12px;border:1px solid var(--border);border-radius:7px;background:var(--white);cursor:pointer;font-size:12px;font-family:var(--font);color:#555}
    .del-btn{padding:5px 12px;border:1px solid #fcc;border-radius:7px;background:var(--white);cursor:pointer;font-size:12px;font-family:var(--font);color:#c0392b}
    .fsec{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
    .ftitle{font-size:15px;font-weight:700;margin-bottom:14px}
    .flbl{display:block;font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;margin-top:12px}
    .finput{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:9px;font-size:15px;font-family:var(--font);background:var(--white);color:var(--dark);-webkit-appearance:none}
    .finput:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px #e8650a18}
    textarea.finput{height:80px;resize:vertical}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .photo-box{border:2px dashed var(--border);border-radius:9px;padding:14px;text-align:center;cursor:pointer;min-height:64px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;background:var(--card)}
    .photo-prev{max-height:90px;border-radius:6px;object-fit:contain}
    .photo-hint{font-size:13px;color:#aaa}
    .rm-photo{font-size:12px;color:#c0392b;background:none;border:none;cursor:pointer;font-family:var(--font);margin-top:5px;display:none}
    .fbtns{display:flex;gap:8px;margin-top:16px;padding-bottom:6px}
    .save-btn{flex:1;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:600;font-family:var(--font);font-size:15px}
    .cancel-btn{padding:13px 15px;background:var(--white);color:var(--muted);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-family:var(--font);font-size:15px}
    .ov-pane{height:100%;overflow-y:auto;padding:18px 16px;-webkit-overflow-scrolling:touch}
    .cblock{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--white);margin-bottom:14px}
    .cblock-hdr{padding:12px 17px;border-bottom:1px solid #f0ece6;display:flex;align-items:center;justify-content:space-between;background:var(--card);gap:10px}
    .cblock-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
    .cdot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
    .cname{font-size:16px;font-weight:700}
    .cblock-center{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
    .ctotal{font-size:20px;font-weight:800}
    .cearn{font-size:13px;font-weight:700;color:var(--green)}
    .ckm{font-size:12px;font-weight:700;color:var(--blue)}
    .print-btn{padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:var(--white);cursor:pointer;font-size:12px;font-family:var(--font);color:#555;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0}
    .ov-entry{display:flex;align-items:center;gap:8px;padding:9px 17px;border-bottom:1px solid #f8f5f1;font-size:14px}
    .ov-date{font-weight:700;color:#888;width:52px;flex-shrink:0}
    .ov-hrs{font-weight:700;width:30px;flex-shrink:0}
    .ov-km{font-size:12px;font-weight:700;color:var(--blue);white-space:nowrap;flex-shrink:0;min-width:36px}
    .ov-knr{font-size:11px;font-weight:700;color:var(--purple);white-space:nowrap;flex-shrink:0;background:var(--purple-light);padding:2px 7px;border-radius:10px}
    .ov-note{color:#777;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ov-earn{font-size:12px;font-weight:700;color:var(--green);flex-shrink:0;white-space:nowrap}
    .ov-thumb{width:28px;height:28px;border-radius:6px;object-fit:cover;cursor:zoom-in;flex-shrink:0;border:1px solid var(--border)}
    .stat-row{border:1px solid;border-radius:12px;padding:15px 17px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .stat-lbl{font-weight:600;color:var(--muted);font-size:14px}
    .stat-num{font-size:24px;font-weight:800}
    .hint-row{text-align:center;color:var(--muted);font-size:13px;padding:0 0 24px;line-height:1.6}
    .empty{text-align:center;color:#ccc;padding:36px 0;font-size:14px;line-height:1.7}
    .modal-overlay{position:fixed;inset:0;background:#0007;z-index:200;display:flex;align-items:flex-end}
    .modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;padding-bottom:var(--safe-bottom)}
    .modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 0;flex-shrink:0}
    .modal-hdr{padding:16px 20px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
    .modal-title{font-size:18px;font-weight:700}
    .modal-body{overflow-y:auto;padding:4px 20px 16px;-webkit-overflow-scrolling:touch}
    .rate-section{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;padding:14px 0 6px}
    .co-card{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;background:var(--card)}
    .co-card-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .co-card-name{font-weight:700;font-size:15px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .rate-wrap{display:flex;align-items:center;gap:5px;background:var(--white);border:1px solid var(--border);border-radius:9px;padding:9px 12px;flex-shrink:0}
    .rate-sym{font-size:14px;color:var(--muted);font-weight:700}
    .rate-inp{border:none;background:transparent;font-size:15px;font-family:var(--font);width:68px;text-align:right;color:var(--dark);font-weight:700}
    .rate-inp:focus{outline:none}
    .rate-unit{font-size:12px;color:var(--muted)}
    .co-detail-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--border)}
    .co-detail-lbl{font-size:12px;color:var(--muted);font-weight:600;width:52px;flex-shrink:0}
    .logo-preview{height:32px;max-width:90px;object-fit:contain;border-radius:4px;border:1px solid var(--border)}
    .sm-btn{padding:6px 11px;border:1px dashed var(--border);border-radius:7px;background:var(--white);cursor:pointer;font-size:12px;font-family:var(--font);color:var(--muted);white-space:nowrap}
    .sm-btn-red{padding:6px 11px;border:1px solid #fcc;border-radius:7px;background:var(--white);cursor:pointer;font-size:12px;font-family:var(--font);color:#c0392b;white-space:nowrap}
    .color-picker-wrap{display:flex;align-items:center;gap:8px;flex:1}
    .color-swatch{width:28px;height:28px;border-radius:6px;border:2px solid var(--border);cursor:pointer;padding:0;overflow:hidden;flex-shrink:0}
    .color-hint{font-size:11px;color:var(--muted)}
    .modal-note{font-size:13px;color:var(--muted);margin-top:16px;padding:12px 14px;background:var(--card);border-radius:10px;line-height:1.6}
    .no-cos{color:var(--muted);font-size:14px;text-align:center;padding:24px 0}
    .opt-row{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
    .opt-lbl{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:500;cursor:pointer;flex:1}
    .opt-lbl input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
    .sig-sub{margin-top:10px;padding:14px;background:var(--card);border-radius:10px;border:1px solid var(--border)}
    .lightbox{position:fixed;inset:0;background:#000b;z-index:300;display:none;align-items:center;justify-content:center}
    .lightbox.on{display:flex}
    .lightbox img{max-width:92vw;max-height:88vh;border-radius:12px}
  </style>
</head>
<body>
<div id="app"><div style="display:flex;flex-direction:column;height:100vh"><div class="spin-wrap"><div class="spin"></div><div class="spin-txt">Verbinden met cloud...</div></div></div></div>
<div class="lightbox" id="lb" onclick="closeLb()"><img id="lb-img" src="" alt="foto"></div>
<div class="toast" id="toast"></div>
<script>
const SB_URL='https://sbebkglrlopufsjixmos.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNiZWJrZ2xybG9wdWZzaml4bW9zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMjIwMTksImV4cCI6MjA5NDY5ODAxOX0.UWp0aCddXJPxOxIGXBNDm8eBvAqztCuQDbKloPa7wwE';
const SBH={apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json'};

async function dbGet(t,q=''){const r=await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{headers:SBH});if(!r.ok)throw new Error(await r.text());return r.json();}
async function dbUpsert(t,d){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:{...SBH,Prefer:'resolution=merge-duplicates'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());}
async function dbDel(t,id){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${encodeURIComponent(id)}`,{method:'DELETE',headers:SBH});if(!r.ok)throw new Error(await r.text());}

const MN=["Januari","Februari","Maart","April","Mei","Juni","Juli","Augustus","September","Oktober","November","December"];
const DN=["Ma","Di","Wo","Do","Vr","Za","Zo"];
const CLR=["#e8650a","#2d6a4f","#4361ee","#9b2335","#7209b7","#0077b6","#b5838d","#457b9d","#e63946","#2a9d8f"];
const NOW=new Date();
const todayStr=fd(NOW.getFullYear(),NOW.getMonth(),NOW.getDate());
let syncBusy=false;

let S={
  loading:true,err:null,
  view:'cal',y:NOW.getFullYear(),m:NOW.getMonth(),
  sel:null,panel:false,showForm:false,editId:null,showRates:false,
  showPrint:false,printCo:null,showWeeks:false,
  printOpts:{notes:true,amounts:true,uurtarief:false,sig1Active:false,sig2Active:false,sig1:'Jordy Koning',sig2:'Stage begeleider'},
  form:{co:'',hrs:'',km:'',klantnr:'',notes:'',photo:null,pname:''},
  entries:[],rates:{},kmRate:0,userName:'',userNum:'',logos:{},brandColors:{}
};

async function loadData(){
  try{
    const[entries,settings]=await Promise.all([
      dbGet('entries','select=*&order=date.asc'),
      dbGet('settings','select=*')
    ]);
    S.entries=entries.map(e=>({...e,hrs:Number(e.hrs),km:Number(e.km||0),klantnr:e.klantnr||''}));
    const cfg=settings.find(s=>s.key==='config');
    if(cfg){try{const c=JSON.parse(cfg.value);S.rates=c.rates||{};S.kmRate=c.kmRate||0;S.userName=c.userName||'';S.userNum=c.userNum||'';S.logos=c.logos||{};S.brandColors=c.brandColors||{};if(c.printOpts)S.printOpts={...S.printOpts,...c.printOpts};}catch{}}
    S.err=null;
  }catch(e){S.err='Kon geen verbinding maken.\nCheck je internet en probeer opnieuw.';console.error(e);}
  S.loading=false;R();
}

async function saveSettings(){
  setSyncing(true);
  try{await dbUpsert('settings',{key:'config',value:JSON.stringify({rates:S.rates,kmRate:S.kmRate,userName:S.userName,userNum:S.userNum,printOpts:S.printOpts,logos:S.logos,brandColors:S.brandColors})});}
  catch(e){console.error(e);}
  setSyncing(false);
}

function setSyncing(v){syncBusy=v;const d=document.querySelector('.sync-dot');if(d)d.classList.toggle('busy',v);}
function showToast(msg){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200);}

function coId(co){let h=0;for(let i=0;i<co.length;i++)h=((h<<5)-h+co.charCodeAt(i))|0;return'co'+Math.abs(h);}
function fd(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function pd(s){const[y,m,d]=s.split('-').map(Number);return{y,m:m-1,d};}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function fdm(y,m){const d=new Date(y,m,1).getDay();return d===0?6:d-1;}
function allCo(){return[...new Set(S.entries.map(e=>e.co))].filter(Boolean);}
function allKlantnr(){return[...new Set(S.entries.map(e=>e.klantnr).filter(Boolean))];}
function coColor(c){return(S.brandColors&&S.brandColors[c])||CLR[Math.max(0,allCo().indexOf(c))%CLR.length];}
function deForDay(ds){return S.entries.filter(e=>e.date===ds);}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtShort(ds){const{m,d}=pd(ds);return`${d} ${MN[m].slice(0,3)}`;}
function fmtLong(ds){const{y,m,d}=pd(ds);return`${d} ${MN[m]} ${y}`;}
function euro(n){return'€\u00a0'+Number(n).toLocaleString('nl-NL',{minimumFractionDigits:2,maximumFractionDigits:2});}

function monthData(){
  const map={};
  S.entries.filter(e=>{const{y,m}=pd(e.date);return y===S.y&&m===S.m;})
  .forEach(e=>{if(!map[e.co])map[e.co]={hrs:0,km:0,entries:[]};map[e.co].hrs+=e.hrs;map[e.co].km+=e.km;map[e.co].entries.push(e);});
  return map;
}
function totalHrs(){return Object.values(monthData()).reduce((s,v)=>s+v.hrs,0);}
function totalKm(){return S.entries.filter(e=>{const{y,m}=pd(e.date);return y===S.y&&m===S.m;}).reduce((s,e)=>s+e.km,0);}
function totalEarn(){const d=monthData();return Object.entries(d).reduce((s,[co,v])=>s+(S.rates[co]?v.hrs*S.rates[co]:0),0)+(S.kmRate?totalKm()*S.kmRate:0);}
function hasRate(){return allCo().some(c=>S.rates[c])||S.kmRate>0;}

/* ── Kleur extractie uit logo ── */
async function extractColor(imgSrc){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      try{
        const cv=document.createElement('canvas');cv.width=cv.height=64;
        const ctx=cv.getContext('2d');ctx.drawImage(img,0,0,64,64);
        const d=ctx.getImageData(0,0,64,64).data;
        const map={};
        for(let i=0;i<d.length;i+=4){
          const r=d[i],g=d[i+1],b=d[i+2],a=d[i+3];
          if(a<100)continue;
          if(r>235&&g>235&&b>235)continue; // wit
          if(r<20&&g<20&&b<20)continue;    // zwart
          if(Math.max(r,g,b)-Math.min(r,g,b)<45)continue; // grijs
          const k=`${Math.round(r/28)*28},${Math.round(g/28)*28},${Math.round(b/28)*28}`;
          map[k]=(map[k]||0)+1;
        }
        const top=Object.entries(map).sort((a,b)=>b[1]-a[1])[0];
        if(!top){res(null);return;}
        const[r,g,b]=top[0].split(',').map(Number);
        res('#'+[r,g,b].map(v=>Math.min(255,v).toString(16).padStart(2,'0')).join(''));
      }catch{res(null);}
    };
    img.onerror=()=>res(null);
    img.src=imgSrc;
  });
}

function toggleWeeks(){S.showWeeks=!S.showWeeks;R();}

function isoWeek(dateStr){
  const{y,m,d}=pd(dateStr);
  const dt=new Date(Date.UTC(y,m,d));
  const day=dt.getUTCDay()||7;
  dt.setUTCDate(dt.getUTCDate()+4-day);
  const y1=new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  return Math.ceil((((dt-y1)/86400000)+1)/7);
}

function weekRange(entries){
  const dates=entries.map(e=>{const{y,m,d}=pd(e.date);return new Date(y,m,d);});
  const mn=new Date(Math.min(...dates)),mx=new Date(Math.max(...dates));
  if(mn.getMonth()===mx.getMonth())
    return mn.getDate()===mx.getDate()?`${mn.getDate()} ${MN[mn.getMonth()].slice(0,3)}`:`${mn.getDate()}–${mx.getDate()} ${MN[mn.getMonth()].slice(0,3)}`;
  return`${mn.getDate()} ${MN[mn.getMonth()].slice(0,3)} – ${mx.getDate()} ${MN[mx.getMonth()].slice(0,3)}`;
}

function weeklyData(){
  const map={};
  S.entries.filter(e=>{const{y,m}=pd(e.date);return y===S.y&&m===S.m;})
  .forEach(e=>{const w=isoWeek(e.date);if(!map[w])map[w]={hrs:0,km:0,entries:[]};map[w].hrs+=e.hrs;map[w].km+=e.km;map[w].entries.push(e);});
  return Object.entries(map).sort((a,b)=>Number(a[0])-Number(b[0]));
}S.view=v;S.panel=false;S.sel=null;S.showRates=false;S.showPrint=false;R();}

function compressImg(dataUrl,mw,mh,q){return new Promise(res=>{const img=new Image();img.onload=()=>{const rr=Math.min(mw/img.width,mh/img.height,1);const c=document.createElement('canvas');c.width=Math.round(img.width*rr);c.height=Math.round(img.height*rr);c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',q));};img.src=dataUrl;});}

function onPhoto(ev){const file=ev.target.files[0];if(!file)return;const r=new FileReader();r.onload=async e=>{const comp=await compressImg(e.target.result,900,900,.72);S.form.photo=comp;S.form.pname=file.name;const box=document.querySelector('.photo-box');if(box)box.innerHTML=`<img class="photo-prev" src="${comp}">`;const rb=document.querySelector('.rm-photo');if(rb)rb.style.display='block';};r.readAsDataURL(file);}
function rmPhoto(){S.form.photo=null;S.form.pname='';const box=document.querySelector('.photo-box');if(box)box.innerHTML=`<span style="font-size:22px">📎</span><span class="photo-hint">Klik om foto toe te voegen</span>`;const rb=document.querySelector('.rm-photo');if(rb)rb.style.display='none';}

async function onLogoUpload(co,ev){

function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return{r,g,b};}
function lighten(hex,pct){const{r,g,b}=hexToRgb(hex);const mix=v=>Math.round(v+(255-v)*pct);return`rgb(${mix(r)},${mix(g)},${mix(b)})`;}

function buildApp(){

  if(S.err)return`<div style="display:flex;flex-direction:column;height:100vh"><div class="err-wrap"><div style="font-size:48px">⚠️</div><div class="err-msg">${esc(S.err)}</div><button class="retry-btn" onclick="S.loading=true;R();loadData()">Opnieuw proberen</button></div></div>`;
  return buildHdr()+buildMnav()+`<div class="main">${S.view==='cal'?buildCal():buildOv()}</div>`
    +(S.view==='cal'?buildSheet():'')
    +(S.view==='cal'?`<div class="backdrop ${S.panel?'on':''}" onclick="closePanel()"></div>`:'')

function buildCal(){
  const d=dim(S.y,S.m),f=fdm(S.y,S.m);
  let h=DN.map(n=>`<div class="dhdr">${n}</div>`).join('');
  for(let i=0;i<f;i++)h+='<div></div>';
  for(let day=1;day<=d;day++){
    const ds=fd(S.y,S.m,day),de=deForDay(ds);
    const th=de.reduce((s,e)=>s+e.hrs,0),tkm=de.reduce((s,e)=>s+e.km,0);
    const isT=ds===todayStr,isSel=ds===S.sel,dow=(f+day-1)%7,isW=dow===5||dow===6;
    const cos=[...new Set(de.map(e=>e.co))];
    h+=`<div class="dcell${isW?' wknd':''}${isT?' today':''}${isSel?' sel':''}" onclick="pickDay(${day})"><div style="display:flex;justify-content:space-between;align-items:flex-start"><span class="dnum${isT?' today':''}">${day}</span>${th?`<span class="dhours">${th}u</span>`:''}</div>${tkm?`<div class="dkm">🚗 ${tkm}km</div>`:''}${cos.length?`<div class="ddots">${cos.slice(0,2).map(c=>`<div class="ddot-row"><span class="dot" style="background:${coColor(c)}"></span><span class="dlabel">${esc(c)}</span></div>`).join('')}</div>`:''}</div>`;
  }
  return`<div class="cal-pane"><div class="cal-grid">${h}</div></div>`;
}

function buildSheet(){
  if(!S.sel)return`<div class="sheet" id="sheet"></div>`;
  const{y,m,d}=pd(S.sel);const de=deForDay(S.sel);
  const th=de.reduce((s,e)=>s+e.hrs,0),tkm=de.reduce((s,e)=>s+e.km,0);
  const cards=de.length===0&&!S.showForm?`<div class="empty">📝<br>Nog geen registraties.<br>Klik op '+ Toevoegen'.</div>`
    :de.map(e=>{const rate=S.rates[e.co];const earn=(rate?e.hrs*rate:0)+(e.km&&S.kmRate?e.km*S.kmRate:0);const showEarn=(rate!=null)||(e.km&&S.kmRate);
      return`<div class="ecard"><div class="etop"><div class="etop-left"><span class="cbadge" style="background:${coColor(e.co)}18;color:${coColor(e.co)};border-color:${coColor(e.co)}30">${esc(e.co)}</span><div class="etop-badges">${e.klantnr?`<span class="eknr-badge">🔢 ${esc(e.klantnr)}</span>`:''} ${e.km?`<span class="ekm-badge">🚗 ${e.km} km</span>`:''}</div></div><div class="etop-right"><span class="ehours">${e.hrs}u</span>${showEarn&&earn>0?`<div style="font-size:13px;font-weight:700;color:var(--green)">${euro(earn)}</div>`:''}</div></div>${e.notes?`<p class="enotes">${esc(e.notes)}</p>`:''}${e.photo?`<img class="ephoto" src="${e.photo}" onclick="openLb('${e.id}')">`:''}<div class="eacts"><button class="edit-btn" onclick="openEdit('${e.id}')">✎ Bewerken</button><button class="del-btn" onclick="doDelete('${e.id}')">Verwijderen</button></div></div>`;
    }).join('');
  const knrList=allKlantnr();
  const form=S.showForm?`<div class="fsec"><div class="ftitle">${S.editId?'Registratie bewerken':'Nieuwe registratie'}</div>
    <label class="flbl">Bedrijf</label>
    <input class="finput" list="cl" type="text" placeholder="Bedrijfsnaam" value="${esc(S.form.co)}" oninput="S.form.co=this.value">
    <datalist id="cl">${allCo().map(c=>`<option value="${esc(c)}">`).join('')}</datalist>
    <label class="flbl">Klant / Werknummer <span style="font-weight:400;color:#bbb">(optioneel)</span></label>
    <input class="finput" list="knrl" type="text" placeholder="Bijv. KL-1234" value="${esc(S.form.klantnr)}" oninput="S.form.klantnr=this.value">
    <datalist id="knrl">${knrList.map(k=>`<option value="${esc(k)}">`).join('')}</datalist>
    <div class="row2">
      <div><label class="flbl">Uren</label><input class="finput" type="number" step="0.5" min="0" placeholder="7.5" value="${esc(S.form.hrs)}" oninput="S.form.hrs=this.value"></div>
      <div><label class="flbl">Kilometers</label><input class="finput" type="number" step="1" min="0" placeholder="42" value="${esc(S.form.km)}" oninput="S.form.km=this.value"></div>
    </div>
    <label class="flbl">Notitie</label>
    <textarea class="finput" placeholder="Optionele notitie..." oninput="S.form.notes=this.value">${esc(S.form.notes)}</textarea>
    <label class="flbl">Foto</label>
    <div class="photo-box" onclick="document.getElementById('fp').click()">${S.form.photo?`<img class="photo-prev" src="${S.form.photo}">`:`<span style="font-size:22px">📎</span><span class="photo-hint">Klik om foto toe te voegen</span>`}</div>
    <button class="rm-photo" onclick="rmPhoto()" style="display:${S.form.photo?'block':'none'}">✕ Foto verwijderen</button>
    <input type="file" id="fp" accept="image/*" style="display:none" onchange="onPhoto(event)">
    <div class="fbtns"><button class="save-btn" onclick="doSave()">Opslaan</button><button class="cancel-btn" onclick="cancelForm()">Annuleren</button></div>
  </div>`:'';
  return`<div class="sheet ${S.panel?'on':''}" id="sheet"><div class="sheet-handle"></div><div class="sheet-hdr"><div><div class="sheet-date">${d} ${MN[m]} ${y}</div><div class="sheet-sub">${th}u gewerkt${tkm?` · ${tkm} km`:''} · ${de.length} registratie${de.length!==1?'s':''}</div></div><div class="sheet-hdr-right"><button class="add-btn" onclick="openAdd()">+ Toevoegen</button><button class="x-btn" onclick="closePanel()">✕</button></div></div><div class="sheet-body">${cards}${form}</div></div>`;
}

function buildOv(){
  const data=monthData(),keys=Object.keys(data);
  if(!keys.length)return`<div class="ov-pane"><div class="empty" style="padding-top:60px"><div style="font-size:48px;margin-bottom:12px">📊</div>Geen registraties voor ${MN[S.m]}.</div></div>`;
  const blocks=keys.sort((a,b)=>data[b].hrs-data[a].hrs).map(co=>{
    const{hrs,km,entries}=data[co],c=coColor(co),rate=S.rates[co];
    const earnHrs=rate!=null?hrs*rate:null;const earnKm=km&&S.kmRate?km*S.kmRate:null;
    const earnTotal=(earnHrs!=null||earnKm!=null)?((earnHrs||0)+(earnKm||0)):null;
    return`<div class="cblock"><div class="cblock-hdr"><div class="cblock-left"><span class="cdot" style="background:${c}"></span><span class="cname">${esc(co)}</span></div><div class="cblock-center"><span class="ctotal" style="color:${c}">${hrs}u</span>${km?`<span class="ckm">🚗 ${km} km</span>`:''}${earnTotal!=null?`<span class="cearn">${euro(earnTotal)}</span>`:''}</div><button class="print-btn" onclick="openPrint('${esc(co)}')">🖨 Afdrukken</button></div>
    ${entries.slice().sort((a,b)=>a.date.localeCompare(b.date)).map(e=>{const er=S.rates[e.co];const ee=(er?e.hrs*er:0)+(e.km&&S.kmRate?e.km*S.kmRate:0);const showEe=er!=null||(e.km&&S.kmRate);
      return`<div class="ov-entry"><span class="ov-date">${fmtShort(e.date)}</span><span class="ov-hrs">${e.hrs}u</span><span class="ov-km">${e.km?'🚗 '+e.km:''}</span>${e.klantnr?`<span class="ov-knr">${esc(e.klantnr)}</span>`:''}<span class="ov-note">${e.notes?esc(e.notes):'<span style="color:#ccc">—</span>'}</span>${showEe&&ee>0?`<span class="ov-earn">${euro(ee)}</span>`:''}${e.photo?`<img class="ov-thumb" src="${e.photo}" onclick="openLb('${e.id}')">`:''}</div>`;
    }).join('')}</div>`;
  }).join('');
  const th=totalHrs(),tkm=totalKm(),te=totalEarn();
  const weeks=weeklyData();
  const weekBlock=S.showWeeks?`<div class="cblock" style="margin-bottom:14px">
    <div class="cblock-hdr" style="background:var(--card)">
      <div class="cblock-left"><span style="font-size:16px">📅</span><span class="cname">Weekoverzicht</span></div>
    </div>
    ${weeks.map(([w,v])=>`
      <div class="ov-entry" style="padding:11px 17px">
        <span style="font-weight:800;color:var(--accent);width:60px;flex-shrink:0;font-size:13px">Week ${w}</span>
        <span style="color:var(--muted);font-size:13px;flex:1">${weekRange(v.entries)}</span>
        <span style="font-weight:700;font-size:15px;color:var(--dark)">${v.hrs}u</span>
        ${v.km?`<span style="font-size:12px;font-weight:700;color:var(--blue);margin-left:10px">🚗 ${v.km}km</span>`:''}
      </div>`).join('')}
  </div>`:'';
  return`<div class="ov-pane">${blocks}${weekBlock}<div style="display:flex;justify-content:center;margin-bottom:14px"><button onclick="toggleWeeks()" style="padding:9px 18px;border:1px solid var(--border);border-radius:20px;background:${S.showWeeks?'var(--dark)':'var(--white)'};color:${S.showWeeks?'#fff':'var(--muted)'};font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer">📅 Weekoverzicht ${S.showWeeks?'verbergen':'tonen'}</button></div><div class="stat-row" style="border-color:#e8650a30;background:var(--accent-light)"><span class="stat-lbl">Totaal uren ${MN[S.m]}</span><span class="stat-num" style="color:var(--accent)">${th}u</span></div>${tkm?`<div class="stat-row" style="border-color:#b8d9ef;background:var(--blue-light)"><span class="stat-lbl">🚗 Totaal km ${MN[S.m]}</span><span class="stat-num" style="color:var(--blue)">${tkm} km</span></div>`:''}${te>0?`<div class="stat-row" style="border-color:#2d6a4f30;background:var(--green-light)"><span class="stat-lbl">💶 Totaal inkomen ${MN[S.m]}</span><span class="stat-num" style="color:var(--green)">${euro(te)}</span></div>`:''}${!hasRate()?`<div class="hint-row">Stel een uurtarief in via 💶 Tarieven<br>om je inkomen automatisch te berekenen.</div>`:''}</div>`;
}

function buildPrintModal(){
  const o=S.printOpts;
  return`<div class="modal-overlay" onclick="if(event.target===this)closePrint()"><div class="modal"><div class="modal-handle"></div>
    <div class="modal-hdr"><div class="modal-title">🖨 Afdrukken – ${esc(S.printCo)}</div><button class="x-btn" onclick="closePrint()">✕</button></div>
    <div class="modal-body">
      <div style="font-size:14px;color:var(--muted);padding:14px 0 4px">Overzicht voor <strong>${esc(S.printCo)}</strong> – ${MN[S.m]} ${S.y}</div>
      <label class="flbl" style="margin-top:16px">Jouw naam</label>
      <input id="print-name" class="finput" type="text" placeholder="Voor- en achternaam" value="${esc(S.userName)}">
      <label class="flbl">Personeelsnummer <span style="font-weight:400;color:#bbb">(optioneel)</span></label>
      <input id="print-num" class="finput" type="text" placeholder="Bijv. 12345" value="${esc(S.userNum)}">
      <label class="flbl" style="margin-top:20px">Wat wil je weergeven?</label>
      <div class="opt-row"><label class="opt-lbl"><input type="checkbox" id="opt-notes" ${o.notes?'checked':''}> Notities weergeven</label></div>
      <div class="opt-row"><label class="opt-lbl"><input type="checkbox" id="opt-amounts" ${o.amounts?'checked':''}> Bedragen weergeven</label></div>
      <div class="opt-row"><label class="opt-lbl"><input type="checkbox" id="opt-uurtarief" ${o.uurtarief?'checked':''}> Uurtarief weergeven</label></div>
      <label class="flbl" style="margin-top:20px">Handtekeningen</label>
      <div class="opt-row"><label class="opt-lbl"><input type="checkbox" id="opt-sig1-active" ${o.sig1Active?'checked':''} onchange="document.getElementById('sig1-name').style.display=this.checked?'block':'none'"> Handtekening 1 toevoegen</label></div>
      <div id="sig1-name" style="display:${o.sig1Active?'block':'none'}"><div class="sig-sub"><label class="flbl" style="margin-top:0">Naam</label><input id="opt-sig1" class="finput" type="text" value="${esc(o.sig1)}"></div></div>
      <div class="opt-row"><label class="opt-lbl"><input type="checkbox" id="opt-sig2-active" ${o.sig2Active?'checked':''} onchange="document.getElementById('sig2-name').style.display=this.checked?'block':'none'"> Handtekening 2 toevoegen</label></div>
      <div id="sig2-name" style="display:${o.sig2Active?'block':'none'}"><div class="sig-sub"><label class="flbl" style="margin-top:0">Naam</label><input id="opt-sig2" class="finput" type="text" value="${esc(o.sig2)}"></div></div>
      <div class="modal-note">💡 Je keuzes worden onthouden voor de volgende keer.</div>
      <div class="fbtns"><button class="save-btn" onclick="doPrint()">🖨 Openen & afdrukken</button><button class="cancel-btn" onclick="closePrint()">Annuleren</button></div>
    </div>
  </div></div>`;
}

function buildRatesModal(){
  const cos=allCo();
  return`<div class="modal-overlay" onclick="if(event.target===this)closeRates()"><div class="modal"><div class="modal-handle"></div>
    <div class="modal-hdr"><div class="modal-title">💶 Tarieven & huisstijl</div><button class="x-btn" onclick="closeRates()">✕</button></div>
    <div class="modal-body">
      <div class="rate-section">Per bedrijf</div>
      ${cos.length===0?`<div class="no-cos">Voeg eerst registraties toe.</div>`:cos.map(co=>{
        const id=coId(co);const c=coColor(co);const hasLogo=!!S.logos[co];
        return`<div class="co-card">
          <div class="co-card-top">
            <span class="dot" style="background:${c};width:12px;height:12px;border-radius:50%;flex-shrink:0"></span>
            <span class="co-card-name">${esc(co)}</span>
            <div class="rate-wrap"><span class="rate-sym">€</span><input class="rate-inp" type="number" step="0.50" min="0" placeholder="0.00" data-co="${esc(co)}" value="${S.rates[co]||''}"><span class="rate-unit">/u</span></div>
          </div>
          <div class="co-detail-row">
            <span class="co-detail-lbl">Logo</span>
            ${hasLogo?`<img class="logo-preview" src="${S.logos[co]}">`:'' }
            <button class="sm-btn" onclick="document.getElementById('lf-${id}').click()">📷 ${hasLogo?'Wijzigen':'Uploaden'}</button>
            ${hasLogo?`<button class="sm-btn-red" onclick="removeLogo('${esc(co)}')">✕</button>`:''}
            <input type="file" id="lf-${id}" accept="image/*" style="display:none" onchange="onLogoUpload('${esc(co)}',event)">
          </div>
          <div class="co-detail-row">
            <span class="co-detail-lbl">Kleur</span>
            <div class="color-picker-wrap">
              <input type="color" class="color-swatch color-inp" data-co="${esc(co)}" value="${c}">
              <span class="color-hint">Wordt auto-gedetecteerd bij logo upload. Handmatig aanpassen kan ook.</span>
            </div>
          </div>
        </div>`;
      }).join('')}
      <div class="rate-section">Kilometertarief</div>
      <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:18px">🚗</span><span style="font-weight:600;font-size:15px;flex:1">Per kilometer</span>
        <div class="rate-wrap"><span class="rate-sym">€</span><input id="km-rate-inp" class="rate-inp" type="number" step="0.01" min="0" placeholder="0.23" value="${S.kmRate||''}"><span class="rate-unit">/km</span></div>
      </div>
      <div class="modal-note">💡 Upload een logo om de huisstijlkleur automatisch te detecteren. Standaard belastingvrij km-tarief in NL is € 0,23 per km.</div>
      <div style="margin-top:16px;padding-bottom:8px"><button class="save-btn" onclick="closeRates()">Opslaan & sluiten</button></div>
    </div>
  </div></div>`;
}

function attachSwipe(){const sheet=document.getElementById('sheet');if(!sheet)return;let sy=0;sheet.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;},{passive:true});sheet.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-sy>80)closePanel();},{passive:true});}
loadData();
</script>
</body>
</html>
